name: Build iOS & Submit to TestFlight

on:
  push:
    branches:
      - main

jobs:
  build_ios:
    name: Build iOS Production
    type: build
    params:
      platform: ios
      profile: production

  submit_to_testflight:
    name: Submit to TestFlight
    type: submit
    needs: [build_ios]
    params:
      build_id: ${{ jobs.build_ios.outputs.build_id }}
      profile: production
